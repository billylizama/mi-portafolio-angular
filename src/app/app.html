<h2>Mis Proyectos</h2>

<div class="projects-grid">

  @for (p of misProyectos(); track p.id) {
    <app-proyecto-card 
      [titulo]="p.title" 
      [descripcion]="'Tarea automatizada ID: ' + p.id" 
      [enlace]="'https://jsonplaceholder.typicode.com/todos/' + p.id">
    </app-proyecto-card>
  }
</div>
