<div class="card">
  <h2>Sobre Mí</h2>
  <p>Hola, mi nombre es <strong>{{ nombre }}</strong>.</p>
  <p>Soy <strong>{{ profesion }}</strong> — {{ descripcion }}</p>

  <h3>Habilidades Técnicas</h3>
  <ul>
    @for (skill of habilidades; track skill) {
      <li>{{ skill }}</li>
    }
  </ul>

  <button (click)="alternarContacto()">
    {{ mostrarContacto ? 'Ocultar Contacto' : 'Contacto' }}
  </button>

  @if (mostrarContacto) {
    <div class="contacto-info">
      <p>📧 abnerlizama10&#64;gmail.com</p>
      <p>🔗 <a href="https://www.linkedin.com/in/balh/" target="_blank">LinkedIn — Mi Perfil</a></p>
    </div>
  }
</div>
