<div class="about-wrapper">

  <div class="about-left">
    <div class="avatar">BL</div>
    <div class="stats">
      @for (stat of stats; track stat.label) {
        <div class="stat-item">
          <strong>{{ stat.value }}</strong>
          <span>{{ stat.label }}</span>
        </div>
      }
    </div>
  </div>

  <div class="about-right">
    <span class="section-label">Sobre Mí</span>
    <h2>Desarrollador Frontend<br><em>orientado a resultados</em></h2>
    <p class="bio">{{ descripcion }}</p>

    <div class="skills-container">
      @for (grupo of skills; track grupo.categoria) {
        <div class="skill-group">
          <h4>{{ grupo.categoria }}</h4>
          <div class="skill-pills">
            @for (item of grupo.items; track item) {
              <span class="pill">{{ item }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>

</div>
